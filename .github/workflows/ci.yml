name: CI

on:
  push:
  pull_request:

jobs:
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile scripts
        run: python -m py_compile scripts/*.py

      - name: Run starter scripts
        run: |
          python scripts/init_memory.py
          python scripts/memory_state_sync.py
          python scripts/build_demo_dashboard.py
